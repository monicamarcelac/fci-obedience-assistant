function drawLayout(ctx, elems, ax, ay, rot, scale, color, sel) {

        ctx.lineTo((e.x2 || 0) * m, (e.y2 || 0) * m);

          const mx = ((e.x1 || 0) + (e.x2 || 0)) / 2 * m + 8,
            my = ((e.y1 || 0) + (e.y2 || 0)) / 2 * m;

        ctx.fill();
        break;
      case "box":

      case "posSign":
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();

    }
  });

}

      b: "N",

      b: "W",
      l: "N",
      r: "S"

  ctx.save();
  ctx.translate(pad - 3, cH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(d.l, 0, 0);
  ctx.restore();
  ctx.save();

  ctx.rotate(Math.PI / 2);

  ctx.stroke();
  ctx.fillText(d.t, cx, cy - 3);
}
